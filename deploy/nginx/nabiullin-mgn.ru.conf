# HTTP → HTTPS + certbot challenge
server {
    listen 80;
    listen [::]:80;
    server_name nabiullin-mgn.ru www.nabiullin-mgn.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nabiullin-mgn.ru$request_uri;
    }
}

# www → без www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nabiullin-mgn.ru;

    ssl_certificate     /etc/letsencrypt/live/nabiullin-mgn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nabiullin-mgn.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nabiullin-mgn.ru$request_uri;
}

# Основной сайт
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nabiullin-mgn.ru;

    ssl_certificate     /etc/letsencrypt/live/nabiullin-mgn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nabiullin-mgn.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
